name: ndjigi
description: Application de transport N'DJIGI avec authentification multi-profils
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8    # ← même niveau que flutter, pas en dessous

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # HTTP & API
  dio: ^5.4.1
  retrofit: ^4.1.0

  # Stockage sécurisé des tokens
  flutter_secure_storage: ^9.0.0

  # Carte
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  animate_do: ^3.3.2

  # Utilitaires
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  logger: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700